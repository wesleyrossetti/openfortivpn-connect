name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        required: false
        default: true
        type: boolean

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: x86_64
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          shared-key: ${{ matrix.target }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            automake \
            autoconf \
            libtool \
            rpm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build openfortivpn
        run: |
          cd src-tauri/openfortivpn
          ./autogen.sh
          ./configure
          make

      - name: Build helper binary
        run: |
          cd src-tauri
          cargo build --release --target ${{ matrix.target }} -p openvpngui-helper
          mkdir -p target/release
          cp target/${{ matrix.target }}/release/openvpngui-helper target/release/openvpngui-helper

      - name: Build and release with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'OpenFortiVpn Connect v__VERSION__'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft == 'true' }}
          prerelease: false
          args: '--target ${{ matrix.target }}'

  checksums:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    permissions:
      contents: write
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            # For workflow_dispatch, get the latest draft release tag
            TAG=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 --json tagName -q '.[0].tagName')
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.deb" \
            --pattern "*.rpm" \
            --dir ./artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.deb *.rpm > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Upload checksums to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
            ./artifacts/checksums-sha256.txt \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  dispatch-homebrew:
    needs: checksums
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Linux package repository update
        env:
          PKG_REPO_TOKEN: ${{ secrets.PKG_REPO_TOKEN }}
        run: |
          VERSION="${{ needs.checksums.outputs.tag }}"
          VERSION="${VERSION#v}"
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PKG_REPO_TOKEN" \
            "https://api.github.com/repos/walcew/openfortivpn-connect/dispatches" \
            -d "{
              \"event_type\": \"update-packages\",
              \"client_payload\": {
                \"version\": \"$VERSION\",
                \"repo\": \"walcew/openfortivpn-connect\",
                \"asset_pattern\": \"openfortivpn-connect_{version}_amd64.deb\"
              }
            }"
